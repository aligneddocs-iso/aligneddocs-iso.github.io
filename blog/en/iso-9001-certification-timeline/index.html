  <script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What are the stages — and how long does each take?", "acceptedAnswer": {"@type": "Answer", "text": "Certification is not one event but a sequence of phases. For a small business, the realistic per-stage breakdown looks like this: a gap analysis (a few days to two weeks), documentation (the longest stage — typically 2–6 weeks by hand), a short period of running the system and collecting records (2–4 weeks), an internal audit and management review (about a week), and finally the external certification audit in two stages (Stage 1 then Stage 2). The pattern is clear: the audit at the end is fixed and short, but the build-up before it is where weeks accumulate — and documentation is the heaviest single block."}}, {"@type": "Question", "name": "Why does documentation take the longest?", "acceptedAnswer": {"@type": "Answer", "text": "Writing a quality manual, the documented procedures, the quality policy and measurable objectives from a blank page is slow and unfamiliar work. Most small businesses underestimate it: a generic template still demands 20–40 hours of tailoring to reflect how you actually operate, and getting the structure right against the standard is the part people redo most often. This is the single stage you can compress the most without cutting any corner. AlignedDocs produces a tailored, standard-compliant ISO 9001:2015 quality manual from your real business inputs in 48 hours — turning the longest stage into the shortest, so the rest of your timeline is driven by your audit scheduling, not by paperwork."}}, {"@type": "Question", "name": "What makes certification faster or slower?", "acceptedAnswer": {"@type": "Answer", "text": "Your timeline moves mostly on a handful of factors — each one you can influence: The takeaway: size and existing maturity set the floor, but documentation speed and audit scheduling set the ceiling. Both are within your control, and documentation is the one you can shorten most dramatically."}}, {"@type": "Question", "name": "Can you really do it in under 3 months?", "acceptedAnswer": {"@type": "Answer", "text": "Yes — for a small single-site business with committed leadership and simple processes, under 3 months is achievable, and some providers advertise even faster back-to-back audits. But be cautious: anything claiming certification in days should raise questions, not excitement, because a real system needs a short period of actual operation before an auditor can verify it works. The honest fast path is not magic — it is removing the avoidable delays. The biggest avoidable delay is documentation, and that is precisely the lever AlignedDocs hands you: a print-ready quality manual in 48 hours for €179, so your timeline depends on your auditor's calendar, not on weeks of writing."}}]}</script>
