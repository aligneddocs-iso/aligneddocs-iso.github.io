<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "Do I need any ISO knowledge to order?", "acceptedAnswer": {"@type": "Answer", "text": "Not at all. You don't need to know the standard or a single piece of ISO jargon. The form asks about your business in plain language — how you actually work, your team, your goals. We turn that into the proper structure for you."}}, {"@type": "Question", "name": "What if I can't answer a question in the form?", "acceptedAnswer": {"@type": "Answer", "text": "Just leave it blank or write what you know. Optional fields are clearly marked. If something important is missing, we get in touch before we build your manual — you're never left guessing."}}, {"@type": "Question", "name": "How long does the form take?", "acceptedAnswer": {"@type": "Answer", "text": "About 30 minutes. That's the whole job on your side. Compare that to the 20–40 hours a DIY template would cost you in evenings and weekends."}}, {"@type": "Question", "name": "Do I need a consultant for ISO 9001?", "acceptedAnswer": {"@type": "Answer", "text": "No — and that's the part too few people say out loud. ISO 9001 does not require a consultant. The standard asks you to describe how you already work, keep a few records, and review them honestly once a year. A small business can absolutely own that itself, without ongoing consultant fees."}}, {"@type": "Question", "name": "Can I really do this without help?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. That's exactly what AlignedDocs is for. You answer a structured form about your business; we do the heavy lifting of turning it into a standard-aligned manual. No four-figure invoice, no consultant living in your calendar — a foundation you keep in-house."}}, {"@type": "Question", "name": "What's the difference between this and a free template?", "acceptedAnswer": {"@type": "Answer", "text": "A free template hands you dozens of blank placeholders and leaves the hard part to you: guessing what an auditor wants to see. Your manual arrives already written around your real business. Minutes of form instead of hours of guesswork."}}, {"@type": "Question", "name": "What does it cost?", "acceptedAnswer": {"@type": "Answer", "text": "€179, one-time. No subscription, no hidden fees, no recurring costs. As a small business under §19 of the German VAT Act, we charge no VAT — so €179 is the final price. Compare that to a typical four-figure consulting invoice."}}, {"@type": "Question", "name": "Is the manual aligned with ISO 9001:2015?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The structure follows ISO 9001:2015 and is built as a documentation foundation prepared for your Stage 1 review. It's the groundwork your audit expects — not the certificate itself."}}, {"@type": "Question", "name": "Will this get me certified?", "acceptedAnswer": {"@type": "Answer", "text": "Not on its own — and no honest provider could promise that. AlignedDocs gives you the documentation foundation that prepares you for your audit. The certificate itself comes from an accredited auditor and a recognised certification body. We get you ready for that conversation."}}, {"@type": "Question", "name": "How and when do I receive my manual?", "acceptedAnswer": {"@type": "Answer", "text": "After your order and payment, your manual is written, reviewed and delivered as a PDF to the email you provide. Delivery usually takes up to 3 working days. If anything causes a delay, you hear from us before the deadline, not after."}}, {"@type": "Question", "name": "What language will my manual be in?", "acceptedAnswer": {"@type": "Answer", "text": "Whichever you choose at the final step — independently of the website language. For English you can also pick British or American spelling. Your document, your language."}}, {"@type": "Question", "name": "Can I see a sample before I order?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Real example manuals (German and English) are on the Samples page — generated by AlignedDocs from realistic business input, so you see exactly the kind of document you'll receive."}}, {"@type": "Question", "name": "Who is AlignedDocs for?", "acceptedAnswer": {"@type": "Answer", "text": "Small businesses up to 50 people that want a professional ISO 9001 manual without corporate overhead — across trades, manufacturing, services, IT and more. If you run a lean operation and need a solid foundation, it's built for you."}}, {"@type": "Question", "name": "Does this work outside Germany?", "acceptedAnswer": {"@type": "Answer", "text": "Yes — we serve businesses worldwide. ISO 9001:2015 is an international standard, and your manual is built around it wherever you operate. You can receive the document in German, British or American English."}}, {"@type": "Question", "name": "Does it work for a one-person business or a service company?", "acceptedAnswer": {"@type": "Answer", "text": "Absolutely — not just manufacturers. Whether you're a solo operation, a workshop, an agency or an IT firm, the manual is shaped around how your specific business works."}}, {"@type": "Question", "name": "Can I use it for multiple locations?", "acceptedAnswer": {"@type": "Answer", "text": "The manual covers one company scope as defined in your form. If you need several sites or entities included, just contact us before ordering and we'll sort out the best approach."}}, {"@type": "Question", "name": "What if I'm not satisfied with the result?", "acceptedAnswer": {"@type": "Answer", "text": "Tell us. One revision round is included — if something is factually off or doesn't reflect your business, we fix it. The goal is a document you'll actually use, not just a file in your inbox."}}, {"@type": "Question", "name": "What if my auditor requests changes?", "acceptedAnswer": {"@type": "Answer", "text": "That's normal in any audit. Send us what the auditor flagged and we'll work through it with you in your included revision round. The manual is built to give your auditor the structure they expect from the start."}}, {"@type": "Question", "name": "What if I have questions after ordering?", "acceptedAnswer": {"@type": "Answer", "text": "Email team@aligneddocs.com with your order reference — a real person reads every message. And if anything in your order looks unclear to us, we reach out before building your manual, not after."}}, {"@type": "Question", "name": "Can I adapt the manual myself later?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, it's your document to keep and maintain — that's the whole point of owning it in-house. For a larger update based on changed processes, just get in touch and we'll talk options."}}, {"@type": "Question", "name": "Is my business data secure?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Data is sent over encrypted connections, used only to create your manual, and never for anything else. Full details are in our privacy policy."}}]}</script>
